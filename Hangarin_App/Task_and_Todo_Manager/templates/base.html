{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>
            {% block title %}Hangarin {% endblock %}
        </title>
            <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
            <link rel="stylesheet" href="{% static 'css/stylesheet.css' %}">
    </head>
    <body>
        <div class="wrapper">
            <div class="container ms-0 sidebar">
                <div class="row justify-content-center title">
                    <div class="col-12 text-center pt-3">
                        <p class="fw-bolder Appname">Hangarin</p>
                    </div>
                </div>

                <ul class="nav flex-column text-left">
                    <li class="nav-item">
                        <a href="{% url 'home' %}" class="nav-link text-white d-flex align-items-center">
                            <img src="{% static 'img/Bar Chart.png' %}" alt="" class="me-2">
                            Dashboard
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'task-list' %}" class="nav-link text-white d-flex align-items center">
                            <img src="{% static 'img/Tasklist.png' %}" alt="" class="me-2">
                            Tasks
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="" class="nav-link text-white d-flex align-items center">
                            <img src="{% static 'img/Moleskine.png' %}" alt="" class="me-2">
                            Notes
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="" class="nav-link text-white d-flex align-items center">
                            <img src="{% static 'img/Settings.png' %}" alt="" class="me-2"  style="margin-top: 2px;">
                            Settings
                        </a>
                    </li>
                </ul>
            </div>

            <div class="container app-body flex-column">
                <div class="card-header w-100">
                    <img src="{% static 'img/Group 1.png' %}" alt="" class="bg">
                    <div class="info container-fluid">
                        <div class="row align-items-center g-0" style="padding-right: 10px;">
                            <div class="col-9">
                                <p class="fw-bold mainText">
                                    Can't get things in order?
                                </p>
                                <p class="subText">
                                    Add a new task and let <b>Hangarin</b> organize it for you
                                </p>
                            </div>

                            <div class="col-2 align-self-end text-end">
                                <a href="" class="text-decoration-none">
                                    <p class="fw-bold userName mb-0">
                                        NewUser1
                                    </p>
                                </a>
                            </div>

                            <div class="col-1 text-end">
                                <img src="{% static 'img/Profile.png' %}" class="profile-img">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="main-panel w-100 mt-4">
                    {% block content %}
                    {% endblock %}
                </div>
            </div>
        </div>
    </body>
</html>
